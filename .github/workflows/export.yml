name: TimeTree Export

on:
  schedule:
    - cron: '0 * * * *'   # jede volle Stunde (UTC)
  workflow_dispatch:        # erlaubt manuellen Start ueber den "Run workflow" Button

permissions:
  contents: write            # noetig, damit der Workflow ins Repo committen darf

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: TimeTree Exporter installieren
        run: pip install timetree-exporter

      - name: Kalender exportieren
        env:
          TIMETREE_EMAIL: ${{ secrets.TIMETREE_EMAIL }}
          TIMETREE_PASSWORD: ${{ secrets.TIMETREE_PASSWORD }}
        run: timetree-exporter -c "${{ secrets.TIMETREE_CALENDAR_CODE }}" -o timetree.ics

      - name: Aenderung committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add timetree.ics
          git diff --staged --quiet || git commit -m "Automatisches TimeTree-Update"
          git push
